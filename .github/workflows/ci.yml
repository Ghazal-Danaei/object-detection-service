name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight test dependencies
        # Only the deps needed to run the fast tests (metrics + API with a
        # faked detector). Heavy ML packages are not required in CI.
        run: pip install numpy pytest pillow fastapi httpx pydantic python-multipart

      - name: Run test suite
        run: pytest tests/ -v
